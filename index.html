
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TEMPUS — A Study in Time</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="c-dot" id="c-dot"></div>
  <div class="c-ring" id="c-ring"></div>

  <canvas id="pc"></canvas>

  <section id="hero">
    <div class="hero-bg"></div>

    <div class="hero-inner">
      <p class="brand-eye">TEMPUS &nbsp;·&nbsp; A Study in Time</p>
      <div class="word-row" id="word-row">
        <span class="word-seg" id="ws-l">cl</span>
        <div id="hero-clock-wrap">
          <div class="clock-halo"></div>
          <canvas id="hero-clock"></canvas>
        </div>
        <span class="word-seg" id="ws-r">ck</span>
      </div>
      <p class="hero-sub">Every second, rendered with intention</p>
    </div>

    <div class="scroll-cue" id="scroll-cue">
      <div class="sc-line"></div>
      <span class="sc-label">Scroll</span>
    </div>
  </section>

  <!-- ── WORLD MAP SECTION ── -->
  <section id="worldmap">
    <div class="wm-head">
      <span class="wm-eye">The World at a Glance</span>
      <h2 class="wm-title">Time Flows <em>Everywhere</em></h2>
      <div class="wm-rule"></div>
    </div>
    <div class="wm-stage">
      <div class="wm-glow-backdrop"></div>
      <canvas id="wm-canvas"></canvas>
      <div class="wm-city-pins" id="wm-pins"></div>
    </div>
    <p class="wm-caption">Hover over a city to reveal its local time</p>
  </section>

  <section id="timezones">
    <div class="sec-head">
      <span class="sec-eye">Around the World</span>
      <h2 class="sec-title">Every <em>Meridian</em>,<br>Every Moment</h2>
      <div class="sec-rule"></div>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <footer>
    <div class="f-logo">TEMPUS</div>
    <div class="f-rule"></div>
    <p class="f-line">Time, rendered with intention</p>
  </footer>

  <div id="modal" role="dialog" aria-modal="true">
    <div class="modal-glow"></div>
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <canvas id="modal-cvs"></canvas>
    <div class="modal-txt">
      <div class="m-city" id="m-city"></div>
      <div class="m-tz"   id="m-tz"></div>
      <div class="m-dig"  id="m-dig"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
